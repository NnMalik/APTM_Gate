<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Fixed 240x320 portrait viewport for P4 LED panel -->
    <meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
    <title>APTM — Start LED</title>
    <style>
        /* ========================================================================
           Purpose-built for a 240 x 320 portrait P4 LED panel.
           White background, black text — high contrast under indoor LED.
           Does NOT load display.css so the TV layouts stay untouched.
           ======================================================================== */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 240px;
            height: 320px;
            background: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            gap: 8px;
        }

        /* ── Header (test + event name + LIVE badge) ──
           Green background while the SSE stream is live, grey when reconnecting.
           Folds the old standalone connection row into the title bar to save
           vertical space on the small panel. No reader is attached to a start
           gate, so this only reflects the page↔gate live link. */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            background: #dcfce7;                 /* light green = live */
            border-left: 4px solid #22c55e;
        }
        .header.offline {
            background: #f3f4f6;                 /* grey = reconnecting/offline */
            border-left-color: #9ca3af;
        }
        .header-text { flex: 1; min-width: 0; }  /* clamp the text, not the badge */

        .test-name {
            font-size: 19px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.3px;
            /* 2-line clamp so long names don't overflow the LED */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* ── Event name (under the test name) ── */
        .event-name {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            line-height: 1.15;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .live-badge {
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #15803d;
            background: #bbf7d0;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .header.offline .live-badge {
            color: #6b7280;
            background: #e5e7eb;
        }

        /* ── Two-up stats (Participant / Present) ── */
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 4px 0 2px 0;
        }
        .stat {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
        }
        .stat-label {
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
            color: #374151;
        }

        /* ── Elapsed timer (big centerpiece) ── */
        .timer-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            text-align: center;
            color: #000;
        }

        /* ── Per-group list (PARALLEL events) ── */
        .group-list {
            flex: 1;
            display: none;          /* shown only in PARALLEL mode */
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            overflow: hidden;
        }
        .group-list.show { display: flex; }
        .grp {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            border-bottom: 1px solid #d1d5db;
            padding-bottom: 4px;
        }
        .grp .gl { min-width: 0; }
        .grp .gn {
            font-size: 15px;
            font-weight: 800;
            line-height: 1.05;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        .grp .gs {
            font-size: 11px;
            font-weight: 600;
            color: #374151;
        }
        .grp .gt {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .grp .gt.frozen { color: #15803d; }   /* green once the group's last candidate has passed */

        /* ── Groups/Batches (bottom) ── */
        .groups {
            text-align: center;
            padding-bottom: 2px;
        }
        .groups-value {
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
        }
        .groups-label {
            font-size: 11px;
            font-weight: 600;
            margin-top: 3px;
            color: #374151;
        }
    </style>
</head>
<body>
    <!-- Header: test + event name, green when SSE live, LIVE badge on the right -->
    <div class="header" id="header">
        <div class="header-text">
            <div class="test-name" id="testName">--</div>
            <div class="event-name" id="eventName">--</div>
        </div>
        <span class="live-badge" id="liveBadge">LIVE</span>
    </div>

    <!-- Connection state is driven by display.js via these hidden elements; the
         header mirrors them (green/LIVE vs grey/OFFLINE) via a class observer. -->
    <span id="sseDot" class="conn-dot" style="display:none;"></span>
    <span id="sseLabel" style="display:none;"></span>

    <!-- Participant / Present -->
    <div class="stats-row">
        <div class="stat">
            <div class="stat-value" id="statTotal">--</div>
            <div class="stat-label">Total Participant</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="statPresent">0</div>
            <div class="stat-label">Total Present</div>
        </div>
    </div>

    <!-- PARALLEL mode: one row per live group (start time + its own timer that freezes
         when the group's last candidate passes). Hidden in SPRINT mode. -->
    <div class="group-list" id="groupList"></div>

    <!--
      SPRINT mode heat card — display.js toggles this between block/none.
      Starts hidden; becomes visible when race_start arrives (or initial data has an active heat).
    -->
    <div class="timer-wrap" id="heatCard" style="display:none;">
        <div class="timer" id="heatTimer">00:00.000</div>
    </div>

    <!-- Placeholder so layout doesn't collapse before race_start (SPRINT mode) -->
    <div class="timer-wrap" id="timerPlaceholder">
        <div class="timer">00:00.000</div>
    </div>

    <!-- Total Groups / Batches -->
    <div class="groups">
        <div class="groups-value" id="statGroups">0</div>
        <div class="groups-label">Total Group/Batches</div>
    </div>

    <!-- Hidden elements display.js may touch (kept so setText/setLiveIndicator are harmless no-ops) -->
    <span id="testDate" style="display:none;"></span>
    <span id="clock" style="display:none;"></span>
    <span id="readerStatus" style="display:none;"></span>
    <span id="processingStatus" style="display:none;"></span>
    <span id="feedCount" style="display:none;"></span>
    <div id="activityFeed" style="display:none;"></div>

    <script src="display.js"></script>
    <script>
        // ── LED Start Display Logic ─────────────────────────────────────────
        // Swap the placeholder out once the real heat timer goes live.
        const heatCard = document.getElementById('heatCard');
        const placeholder = document.getElementById('timerPlaceholder');

        // Watch heatCard for display changes (display.js toggles it via applyHeat/clearHeat).
        // In PARALLEL mode the per-group list owns the screen — keep both the SPRINT timer
        // and its placeholder hidden regardless of what display.js does to #heatCard.
        const cardObserver = new MutationObserver(() => {
            if (parallelMode) { placeholder.style.display = 'none'; heatCard.style.display = 'none'; return; }
            const live = heatCard.style.display !== 'none';
            placeholder.style.display = live ? 'none' : 'flex';
        });
        cardObserver.observe(heatCard, { attributes: true, attributeFilter: ['style'] });

        // ── Header live/offline mirror ──────────────────────────────────────
        // display.js toggles #sseDot.connected on SSE open/close. Reflect that onto
        // the header (green + LIVE vs grey + OFFLINE) so the small panel spends no
        // vertical space on a dedicated connection row.
        const sseDot = document.getElementById('sseDot');
        const headerEl = document.getElementById('header');
        const liveBadge = document.getElementById('liveBadge');
        function reflectConnection() {
            const live = sseDot.classList.contains('connected');
            headerEl.classList.toggle('offline', !live);
            liveBadge.textContent = live ? 'LIVE' : 'OFFLINE';
        }
        new MutationObserver(reflectConnection).observe(sseDot, { attributes: true, attributeFilter: ['class'] });
        reflectConnection();

        // Re-fetch display data when HHT pushes attendance/race_start/heat_completion sync so counts
        // and per-group timers update. heat_completion is the relayed finish-gate completion — a
        // reload lets the per-group row (PARALLEL) pick up completedAt + the authoritative duration
        // and freeze. (SPRINT freezes directly via display.js's heat_complete handler.)
        function onSyncData(data) {
            if (data.data_type === 'attendance' || data.data_type === 'race_start'
                || data.data_type === 'heat_completion') {
                setTimeout(Display.loadDisplayData, 300);
            }
        }

        // Heat completed (relayed completion fires this on the start gate too). In PARALLEL the
        // per-group list owns the timers, so reload to freeze the right row on its finish-gate
        // duration. SPRINT is already handled by display.js's built-in heat_complete handler.
        function onHeatComplete(data) {
            if (parallelMode) setTimeout(Display.loadDisplayData, 300);
        }

        // race_start arrives via display.js's built-in SSE handler — it already:
        //   - sets state.gunStartTime
        //   - shows #heatCard
        //   - starts the heat timer
        // We re-pull display-data after a short delay to refresh the group count.
        function onRaceStart(data) {
            setTimeout(Display.loadDisplayData, 300);
        }

        // ── PARALLEL mode (cross-country etc.): per-group start times + timers ──────
        const PARALLEL_MAX_ROWS = 4;     // legibility cap on the small LED panel
        const PARALLEL_ROTATE_MS = 4000; // when >4 groups, cycle the visible window
        let parallelMode = false;
        let parallelHeats = [];          // [{ groupLabel, gunStartTime, completedAt }]
        let rotateOffset = 0;

        // Called by display.js on every (re)load with the full payload.
        function onDisplayData(data) {
            parallelMode = (data.displayMode || 'SPRINT').toUpperCase() === 'PARALLEL';

            const list = document.getElementById('groupList');
            const card = document.getElementById('heatCard');
            const ph = document.getElementById('timerPlaceholder');

            if (parallelMode) {
                // Hand the screen over to the per-group list; suppress the single SPRINT timer.
                parallelHeats = (data.activeHeats || []).slice().sort((a, b) => a.heatNumber - b.heatNumber);
                rotateOffset = 0;
                list.classList.add('show');
                card.style.display = 'none';
                ph.style.display = 'none';
                renderGroups();
            } else {
                parallelHeats = [];
                list.classList.remove('show');
                // SPRINT visibility is managed by display.js applyHeat/clearHeat + the observer.
            }
        }

        function renderGroups() {
            const list = document.getElementById('groupList');
            if (!parallelMode) return;
            if (parallelHeats.length === 0) {
                list.innerHTML = '<div class="grp"><div class="gl"><div class="gn">No group started</div></div></div>';
                return;
            }
            // Rotation window when more groups than rows fit.
            let view = parallelHeats;
            if (parallelHeats.length > PARALLEL_MAX_ROWS) {
                view = [];
                for (let i = 0; i < PARALLEL_MAX_ROWS; i++) {
                    view.push(parallelHeats[(rotateOffset + i) % parallelHeats.length]);
                }
            }
            list.innerHTML = view.map(h => {
                const gun = h.gunStartTime ? new Date(h.gunStartTime) : null;
                const startTxt = gun ? Display.formatClockTime(
                    h.originalGunStartTime ? new Date(h.originalGunStartTime) : gun).slice(0, 8) : '--';
                // "H{n} · ABBR" — heat numbers repeat across HHTs, so the group code disambiguates.
                const label = 'H' + h.heatNumber + ' · ' + (h.abbrev || ('G' + h.heatNumber));
                return '<div class="grp">' +
                    '<div class="gl"><div class="gn">' + escapeHtmlLocal(label) + '</div>' +
                    '<div class="gs">' + startTxt + '</div></div>' +
                    '<div class="gt" data-hid="' + h.heatId + '">--:--</div></div>';
            }).join('');
            tickGroups();
        }

        // Per-group elapsed: live (now - gun) or frozen (completedAt - gun, green) once complete.
        function tickGroups() {
            if (!parallelMode) return;
            const list = document.getElementById('groupList');
            list.querySelectorAll('.gt').forEach(el => {
                // Key by heatId, NOT heatNumber — heat numbers collide across HHTs (each starts at 1).
                const id = el.getAttribute('data-hid');
                const h = parallelHeats.find(x => x.heatId === id);
                if (!h || !h.gunStartTime) { el.textContent = '--:--'; return; }
                const gun = new Date(h.gunStartTime).getTime();
                if (h.completedAt) {
                    // Prefer the authoritative finish-gate duration so this matches the finish LED
                    // exactly; fall back to (completedAt - gun) when it isn't provided.
                    const elapsed = (h.completedDurationSeconds != null)
                        ? h.completedDurationSeconds
                        : (new Date(h.completedAt).getTime() - gun) / 1000;
                    el.textContent = Display.formatElapsed(Math.max(0, elapsed));
                    el.classList.add('frozen');
                } else {
                    el.textContent = Display.formatElapsed(Math.max(0, (Date.now() - gun) / 1000));
                    el.classList.remove('frozen');
                }
            });
        }

        function escapeHtmlLocal(s) {
            const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }

        // Drive the live per-group timers and the rotation window.
        setInterval(tickGroups, 100);
        setInterval(() => {
            if (parallelMode && parallelHeats.length > PARALLEL_MAX_ROWS) {
                rotateOffset = (rotateOffset + PARALLEL_MAX_ROWS) % parallelHeats.length;
                renderGroups();
            }
        }, PARALLEL_ROTATE_MS);
    </script>
</body>
</html>
